version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: dashboard-postgres
    environment:
      TZ: Europe/Warsaw
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./database/init-metabase.sh:/docker-entrypoint-initdb.d/02-init-metabase.sh
    ports:
      - "5432:5432"
    command: >
      postgres
        -c shared_buffers=64MB
        -c max_connections=50
        -c work_mem=4MB
        -c maintenance_work_mem=32MB
        -c effective_cache_size=128MB
        -c wal_buffers=8MB
        -c checkpoint_completion_target=0.9
        -c log_min_duration_statement=1000
        -c timezone=Europe/Warsaw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    restart: unless-stopped
  n8n:
    image: n8nio/n8n:1.34.2
    container_name: dashboard-n8n
    environment:
      - TZ=Europe/Warsaw
      - GENERIC_TIMEZONE=Europe/Warsaw
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - NODE_OPTIONS=--max-old-space-size=512
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=72
      - EXECUTIONS_DATA_PRUNE_MAX_COUNT=500
      - N8N_RUNNERS_MAX_CONCURRENCY=2
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 600M
        reservations:
          memory: 256M
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: dashboard-backend
    environment:
      - TZ=Europe/Warsaw
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - BINANCE_API_URL=${BINANCE_API_URL}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --workers 1
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - REACT_APP_API_URL=http://localhost:8000
    container_name: dashboard-frontend
    environment:
      - TZ=Europe/Warsaw
    ports:
      - "3000:80" # nginx port 80
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
    restart: unless-stopped
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dashboard-pgadmin
    environment:
      - TZ=Europe/Warsaw
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  metabase:
    image: metabase/metabase:v0.59.4.3
    container_name: dashboard-metabase
    environment:
      - TZ=Europe/Warsaw
      - JAVA_OPTS=-Xmx256M
      - MB_DB_TYPE=postgres
      - MB_DB_HOST=postgres
      - MB_DB_PORT=5432
      - MB_DB_DBNAME=metabase_app
      - MB_DB_USER=${POSTGRES_USER}
      - MB_DB_PASS=${POSTGRES_PASSWORD}
    ports:
      - "3001:3000"
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 256M
    restart: unless-stopped

  dbt:
    image: python:3.11-slim
    container_name: dashboard-dbt
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./dbt:/usr/app
    working_dir: /usr/app
    ports:
      - "8080:8080"
    command: sh -c "pip install dbt-core dbt-postgres && tail -f /dev/null"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  postgres_data:
  n8n_data:
  metabase_data:
