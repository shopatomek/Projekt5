version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: dashboard-postgres
    environment:
      TZ: Europe/Warsaw
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    # Kluczowe parametry PostgreSQL dla małego środowiska
    # shared_buffers: domyślnie 128MB → 64MB (wystarczy dla dev)
    # max_connections: domyślnie 100 → 20 (backend + n8n nie potrzebują więcej)
    # work_mem: pamięć na operacje sortowania per-query
    command: >
      postgres
        -c shared_buffers=64MB
        -c max_connections=20
        -c work_mem=4MB
        -c maintenance_work_mem=32MB
        -c effective_cache_size=128MB
        -c wal_buffers=8MB
        -c checkpoint_completion_target=0.9
        -c log_min_duration_statement=1000
        -c timezone=Europe/Warsaw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    restart: unless-stopped

  # n8n - Workflow Automation
  # Przypięta wersja (nie "latest") = stabilność + brak niespodzianek
  # NODE_OPTIONS cap = twardy limit sterty Node.js
  # EXECUTIONS_DATA_PRUNE = nie trzyma logów egzekucji w nieskończoność
  n8n:
    image: n8nio/n8n:1.34.2
    container_name: dashboard-n8n
    environment:
      - TZ=Europe/Warsaw
      - GENERIC_TIMEZONE=Europe/Warsaw
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      # Zarządzanie pamięcią i logami
      - NODE_OPTIONS=--max-old-space-size=512
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=72 # Trzymaj logi max 72h
      - EXECUTIONS_DATA_PRUNE_MAX_COUNT=500
      - N8N_RUNNERS_MAX_CONCURRENCY=2
      # Wyłącz telemetrię (opcjonalnie)
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 600M
        reservations:
          memory: 256M
    restart: unless-stopped

  # -----------------------------------------------------------------
  # Python FastAPI Backend
  # Usunięty --reload (zużywa RAM na watchfiles, zbędny w demo)
  # W trybie DEV: zmień command na: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
  # -----------------------------------------------------------------
  backend:
    build: ./backend
    container_name: dashboard-backend
    environment:
      - TZ=Europe/Warsaw
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - BINANCE_API_URL=${BINANCE_API_URL}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    # --workers 1: jeden proces, wystarczy dla dev/demo
    # Usuń tę linię i wróć do --reload tylko gdy aktywnie rozwijasz
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --workers 1
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M
    restart: unless-stopped

  # -----------------------------------------------------------------
  # React Frontend - multi-stage build → nginx:alpine
  # NAJWIĘKSZA OSZCZĘDNOŚĆ RAMU: CRA dev server (~2-3GB) → nginx (~60MB)
  # Patrz: frontend/Dockerfile.prod
  # UWAGA: hot-reload nie działa w tym trybie - to tryb demo/produkcja
  # -----------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod # nowy plik - patrz frontend/Dockerfile.prod
    container_name: dashboard-frontend
    environment:
      - TZ=Europe/Warsaw
      - REACT_APP_API_URL=http://localhost:8000
    ports:
      - "3000:80" # nginx słucha na :80 wewnątrz kontenera
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
    restart: unless-stopped
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dashboard-pgadmin
    environment:
      - TZ=Europe/Warsaw
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    mem_limit: 256M
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # -----------------------------------------------------------------
  # Opcjonalnie: tryb developerski z hot-reload (więcej RAM)
  # Aby użyć: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
  # -----------------------------------------------------------------
  # =================================================================
  # METABASE - Business Intelligence Dashboard
  # =================================================================
  metabase:
    image: metabase/metabase:v0.52.0
    container_name: dashboard-metabase
    environment:
      - TZ=Europe/Warsaw
      - JAVA_OPTS=-Xmx256M
      - MB_DB_TYPE=postgres
      - MB_DB_DBNAME=${POSTGRES_DB}
      - MB_DB_HOST=postgres
      - MB_DB_PORT=5432
      - MB_DB_USER=${POSTGRES_USER}
      - MB_DB_PASS=${POSTGRES_PASSWORD}
    ports:
      - "3001:3000"
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 256M
    restart: unless-stopped
volumes:
  postgres_data:
  n8n_data:
  metabase_data:

    # =================================================================
    # SZACUNKOWE ZUŻYCIE RAMU PO ZMIANACH:
    #   postgres:  128-256 MB  (było: ~200MB)
    #   n8n:       300-500 MB  (było: ~600MB+)
    #   backend:   150-250 MB  (było: ~300MB)
    #   frontend:  30-60  MB   (było: ~2000-4000MB ← GŁÓWNY WINOWAJCA)
    #   Docker Desktop Win11:  ~1-2 GB (overhead systemu)
    #   ŁĄCZNIE:   ~2-3 GB     (było: ~10-16 GB)
    # =================================================================
